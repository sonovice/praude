name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  detect-version:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Cargo.toml package version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          read_package_version() {
            awk '
              /^\[package\]$/ { in_package = 1; next }
              /^\[/ && in_package { exit }
              in_package && /^version[[:space:]]*=/ {
                version = $0
                sub(/^[^"]*"/, "", version)
                sub(/".*$/, "", version)
                print version
                exit
              }
            ' "$1"
          }

          current_version="$(read_package_version Cargo.toml)"
          if [[ -z "$current_version" ]]; then
            echo "Could not read package.version from Cargo.toml" >&2
            exit 1
          fi

          previous_version=""
          if [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]] &&
             git cat-file -e "${{ github.event.before }}:Cargo.toml" 2>/dev/null; then
            previous_version="$(git show "${{ github.event.before }}:Cargo.toml" > /tmp/previous-Cargo.toml && read_package_version /tmp/previous-Cargo.toml || true)"
          fi

          changed=false
          if [[ -z "$previous_version" ]]; then
            changed=true
          elif [[ "$previous_version" != "$current_version" ]]; then
            changed=true
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "version=$current_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_version=${previous_version:-<none>}"
          echo "current_version=$current_version"
          echo "changed=$changed"

  build:
    name: Build ${{ matrix.artifact }}
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: praude-x86_64-unknown-linux-gnu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            bin: praude
          - artifact: praude-aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            bin: praude
          - artifact: praude-x86_64-apple-darwin
            os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            bin: praude
          - artifact: praude-aarch64-apple-darwin
            os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            bin: praude
          - artifact: praude-x86_64-pc-windows-msvc
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            bin: praude.exe
          - artifact: praude-aarch64-pc-windows-msvc
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
            bin: praude.exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.detect-version.outputs.version }}"
          package="${{ matrix.artifact }}"
          staging="dist/$package"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$staging/"
          cp README.md LICENSE "$staging/"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            asset="dist/${package}.zip"
            (cd dist && 7z a "${package}.zip" "$package")
          else
            asset="dist/${package}.tar.gz"
            tar -C dist -czf "$asset" "$package"
          fi

          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$asset" > "$asset.sha256"
          else
            sha256sum "$asset" > "$asset.sha256"
          fi

          echo "Built $package $version"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.*
          if-no-files-found: error

  release:
    name: Publish release
    needs:
      - detect-version
      - build
    if: needs.detect-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version.outputs.tag }}
          name: praude ${{ needs.detect-version.outputs.version }}
          files: |
            dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
